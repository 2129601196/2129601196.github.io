<!DOCTYPE html>
<html lang="zh-cmn-hans-cn">
	<head>
		<meta charset="UTF-8"/>
		<meta name="author" content="Github:2129601196"/>
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>网易云音乐</title>
		<script type="text/javascript" charset="UTF-8">
            function start(){
                var iframeid = document.getElementById("NetEase-CloudMusic");
                iframeid.src ="about:blank";
                document.getElementById("Window").style.display = 'none';
            }
            function play(){
                document.getElementById("Window").style.display = 'block';
                var iframeid = document.getElementById("NetEase-CloudMusic");
                iframeid.src = "https://music.163.com/outchain/player?type=2&id="+document.getElementById("Songid").value+"&auto=1&height=66";
            }
            function play_hide(){
                document.getElementById("Window").style.display = 'none';
                document.getElementById("NetEase-CloudMusic").src ="about:blank";
                new Audio("https://music.163.com/song/media/outer/url?id="+document.getElementById("Songid").value+".mp3").play();
            }
            function reload(){
                window.location.reload();
            }
            function download(){
                var download_mp3 = "https://music.163.com/song/media/outer/url?id="+document.getElementById("Songid").value+".mp3";
                window.location.href = download_mp3;
            }
            function 歌曲(number){
                document.getElementById("Songid").value = number;
                play();
            }
        </script>
        <style>
            iframe{
    width: 330px;
    height: 86px
}
div{
    width: 330px;
    height: 86px;
    margin: 0 auto;
}
body{
    width: 330px;
    height: 86px;
    margin: 0 auto;
}
h1{
    color: red;
    font-style: italic;
    font-weight: bold;
}
h2{
    color: red;
    font-style: italic;
    font-weight: bold;
}
button {
      z-index: 1;
      position: relative;
      font-size: inherit;
      font-family: inherit;
      color: white;
      padding: 0.5em 1em;
      outline: none;
      border: none;
      background-color: hsl(236, 32%, 26%);
}
button:hover {
      cursor: pointer;
}
button::before {
    content: '';
    z-index: -1;
    position: absolute;
    top: 0;
    bottom: 0;
    left: 0;
    right: 0;
    border: 4px solid hsl(236, 32%, 26%);
    transform-origin: center;
    transform: scale(1);
}
button:hover::before {
    transition: all 0.75s ease-in-out;
    transform-origin: center;
    transform: scale(1.75);
    opacity: 0;
}
.button_song{
    border: medium none;
}
input{
    height: 40px;
    border: 4mm ridge rgba(211, 220, 50, .6);
    width: 330px;
    padding: 0 10px;
}
        </style>
		<link rel="icon" type="icon" href="../things/music-icon.jpg">
	</head>
	<body>
			<input type="number" placeholder="网易云音乐Songid:" id="Songid"/>
			<p>
				<button onclick="play()" type="submit">播放</button>
				<!--<button onclick="play_hide()" type="submit">隐藏播放</button>-->
				<button onclick="download()" type="submit">下载</button>
				<!--start()可改成reload()-->
				<button onclick="reload()" type="submit">刷新</button>
				<button onclick="window.location.href = './'">Github接口</button>
			</p>
			<div id="Window" style="display:none">
				<iframe id="NetEase-CloudMusic" src="about:blank"></iframe>
			</div>
			<h2>热门音乐</h2>
			<button onclick="歌曲(416385506)" type="button">大鱼</button>
			<button onclick="歌曲(333750)" type="button">好运来</button>
	</body>	
</html>
