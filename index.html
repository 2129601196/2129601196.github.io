<!DOCTYPE html>
<head>
    <style>
        h1{
            color: red;
            font-style: italic;
            font-weight: bold;
        }
        button {
            z-index: 1;
            position: relative;
            font-size: inherit;
            font-family: inherit;
            color: white;
            padding: 0.5em 1em;
            outline: none;
            border: none;
            background-color: hsl(236, 32%, 26%);
        }
        button:hover {
            cursor: pointer;
        }
        button::before {
            content: '';
            z-index: -1;
            position: absolute;
            top: 0;
            bottom: 0;
            left: 0;
            right: 0;
            border: 4px solid hsl(236, 32%, 26%);
            transform-origin: center;
            transform: scale(1);
        }
        button:hover::before {
            transition: all 0.75s ease-in-out;
            transform-origin: center;
            transform: scale(1.75);
            opacity: 0;
        }
        .button_song{
            border: medium none;
        }        
        div{
            width: 330px;
            height: 86px;
            margin: 0 auto;
        }
    </style>
    <link rel="stylesheet" href="./things/css.css">
</head>
<html>
    <div><h1>如果你看到我</h1></div>
    <div><h1>说明你成功了</h1></div>
    <div>
        <a href="./music/"><button>音乐</button></a>
        <a href="./app/"><button>应用</button></a>
        <a href="./baidu/"><button>百度</button></a>
    </div>
</html>
